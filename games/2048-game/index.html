<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game - Elite Gaming Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎲 2048</h1>
    <p>Merge the tiles to reach <strong>2048!</strong></p>

    <div class="top-bar">
        <div class="score-box">
            <span>Score</span>
            <h2 id="score">0</h2>
        </div>

        <div class="score-box">
            <span>Best</span>
            <h2 id="best">0</h2>
        </div>
    </div>

    <button id="restart">🔄 New Game</button>

    <div id="board"></div>

</div>

<script src="script.js"></script>

</body>
</html>
